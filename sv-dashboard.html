<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#5B21B6">
<title>SV 대시보드 — 포케올데이</title>

<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root {
    --sv: #5B21B6;
    --sv-dark: #4C1D95;
    --sv-light: #EDE9FE;
    --brand: #00A472;
    --text: #111827;
    --text-sub: #6B7280;
    --text-light: #9CA3AF;
    --text-faint: #D1D5DB;
    --bg: #FFFFFF;
    --bg-soft: #F9FAFB;
    --bg-section: #F3F4F6;
    --border: #E5E7EB;
    --border-light: #F3F4F6;
    --good: #10B981;
    --good-bg: #ECFDF5;
    --warn: #F59E0B;
    --warn-bg: #FFFBEB;
    --bad: #EF4444;
    --bad-bg: #FEF2F2;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: var(--text); background: var(--bg-section);
    -webkit-font-smoothing: antialiased;
  }
  body { min-height: 100vh; padding: 24px 16px; }
  .app {
    max-width: 1280px; margin: 0 auto;
    background: var(--bg);
    min-height: calc(100vh - 48px);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.05);
  }

  /* ─── 로딩 / 에러 ─── */
  .loader-screen, .error-screen {
    min-height: 60vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; padding: 60px 24px;
  }
  .spinner {
    width: 44px; height: 44px; border: 3px solid var(--sv-light);
    border-top-color: var(--sv); border-radius: 50%;
    animation: spin 1s linear infinite; margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text { font-size: 14px; color: var(--text-sub); }
  .loader-sub { font-size: 12px; color: var(--text-light); margin-top: 4px; }
  .error-screen .err-icon { font-size: 48px; margin-bottom: 12px; }
  .error-screen .err-title { font-size: 20px; font-weight: 800; margin-bottom: 10px; }
  .error-screen .err-msg { font-size: 14px; color: var(--text-sub); line-height: 1.6; white-space: pre-line; }

  /* ─── 헤더 ─── */
  .hero {
    background: linear-gradient(135deg, var(--sv) 0%, var(--sv-dark) 100%);
    color: white; padding: 32px 40px;
    position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; top: -30%; right: -5%;
    width: 360px; height: 360px; border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }
  .hero-tag {
    display: inline-block;
    background: rgba(255,255,255,0.18); color: white;
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    padding: 4px 10px; border-radius: 4px; margin-bottom: 10px;
  }
  .hero-title { font-size: 28px; font-weight: 800; margin: 0 0 4px; }
  .hero-sub { font-size: 14px; opacity: 0.85; }

  /* ─── 요약 + KPI 한 줄 ─── */
  .summary-bar {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 1px;
    background: var(--border-light);
  }
  .summary-cell {
    background: var(--bg); padding: 16px 14px;
    text-align: center;
  }
  .summary-cell.click {
    cursor: pointer; transition: background 0.1s;
  }
  .summary-cell.click:hover { background: var(--bg-soft); }
  .summary-cell.click.active {
    background: var(--sv-light);
    box-shadow: inset 0 -3px 0 var(--sv);
  }
  .summary-cell.click.active.good { box-shadow: inset 0 -3px 0 var(--good); background: var(--good-bg); }
  .summary-cell.click.active.warn { box-shadow: inset 0 -3px 0 var(--warn); background: var(--warn-bg); }
  .summary-cell.click.active.bad  { box-shadow: inset 0 -3px 0 var(--bad);  background: var(--bad-bg); }
  .summary-label { font-size: 11px; color: var(--text-sub); font-weight: 600; margin-bottom: 4px; }
  .summary-value { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
  .summary-value.sv { color: var(--sv); }
  .summary-value.good { color: var(--good); }
  .summary-value.warn { color: var(--warn); }
  .summary-value.bad { color: var(--bad); }
  .summary-sub { font-size: 10px; color: var(--text-light); margin-top: 2px; font-weight: 500; }

  /* ─── 검색바 ─── */
  .toolbar {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 24px;
    background: var(--bg-soft);
    border-bottom: 1px solid var(--border-light);
  }
  .search-input {
    flex: 1; max-width: 340px;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px; font-family: inherit;
    background: white;
  }
  .search-input:focus {
    outline: none; border-color: var(--sv);
    box-shadow: 0 0 0 3px var(--sv-light);
  }
  .toolbar-info { font-size: 12px; color: var(--text-sub); }

  /* ─── 매장 테이블 ─── */
  .store-table {
    width: 100%;
    border-collapse: collapse;
  }
  .store-table thead th {
    background: var(--bg-soft);
    padding: 10px 14px;
    text-align: left;
    font-size: 11px; font-weight: 700;
    color: var(--text-sub);
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.03em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .store-table thead th.num { text-align: right; }
  .store-table thead th.center { text-align: center; }
  .store-table tbody tr {
    border-bottom: 1px solid var(--border-light);
    transition: background 0.1s;
  }
  .store-table tbody tr:hover { background: var(--bg-soft); }
  .store-table tbody tr.missing { background: var(--bad-bg); }
  .store-table tbody tr.missing:hover { background: #FDDBDB; }
  .store-table tbody tr.warning { background: var(--warn-bg); }
  .store-table tbody tr.warning:hover { background: #FCE9C7; }
  .store-table td {
    padding: 12px 14px;
    font-size: 13px;
    vertical-align: middle;
  }
  .store-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .store-table td.center { text-align: center; }

  .st-status {
    display: inline-flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; border-radius: 50%;
    font-size: 12px; font-weight: 700; color: white;
  }
  .st-status.good { background: var(--good); }
  .st-status.warning { background: var(--warn); }
  .st-status.missing { background: var(--bad); }
  .st-status.normal { background: var(--text-light); }

  .st-name {
    font-weight: 700; color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .st-id { font-size: 11px; color: var(--text-light); font-weight: 500; }
  .st-meta { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
  .st-op-badge {
    display: inline-block;
    font-size: 10px; color: var(--text-sub);
    background: var(--bg-section);
    padding: 1px 6px; border-radius: 8px;
    font-weight: 600;
  }

  .st-revenue { font-weight: 700; }
  .st-ratio { font-weight: 700; }
  .st-delta { font-size: 11px; margin-top: 1px; }
  .st-delta.up { color: var(--good); }
  .st-delta.down { color: var(--bad); }

  .st-history {
    font-size: 10px; color: var(--text-sub);
    line-height: 1.5;
  }
  .st-history .sent-good { color: var(--good); font-weight: 600; }
  .st-history .sent-warn { color: var(--warn); font-weight: 600; }

  .st-issues {
    font-size: 11px; color: var(--warn);
    background: rgba(245, 158, 11, 0.1);
    padding: 2px 8px; border-radius: 4px;
    display: inline-block;
    margin-top: 3px;
  }

  .st-actions {
    display: flex; gap: 4px; justify-content: flex-end;
  }
  .btn-mini {
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: white;
    font-size: 11px; font-weight: 700;
    cursor: pointer;
    color: var(--text-sub);
    white-space: nowrap;
    transition: all 0.1s;
  }
  .btn-mini:hover { background: var(--bg-soft); color: var(--text); }
  .btn-mini.primary {
    background: var(--sv); color: white; border-color: var(--sv);
  }
  .btn-mini.primary:hover { background: var(--sv-dark); }
  .btn-mini.alert {
    background: var(--bad); color: white; border-color: var(--bad);
  }
  .btn-mini.alert:hover { background: #DC2626; }
  .btn-mini.success {
    background: var(--good); color: white; border-color: var(--good);
  }
  .btn-mini:disabled, .btn-mini.disabled {
    background: var(--bg-section); color: var(--text-faint);
    border-color: var(--border);
    cursor: not-allowed;
  }

  /* ─── 푸터 ─── */
  .footer {
    padding: 24px 40px 32px;
    text-align: center;
    color: var(--text-light);
    font-size: 11px;
    line-height: 1.7;
    border-top: 1px solid var(--border-light);
    background: var(--bg-soft);
  }
  .footer-brand { font-weight: 700; color: var(--text-sub); margin-bottom: 4px; }

  /* ─── 확인 모달 (발송 직전) ─── */
  .confirm-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    padding: 20px;
  }
  .confirm-box {
    background: white; border-radius: 16px;
    padding: 28px; max-width: 420px; width: 100%;
    text-align: center;
  }
  .confirm-icon { font-size: 40px; margin-bottom: 8px; }
  .confirm-title { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
  .confirm-msg { font-size: 13px; color: var(--text-sub); line-height: 1.7; margin-bottom: 22px; }
  .confirm-msg strong { color: var(--text); }
  .confirm-warning {
    background: var(--warn-bg);
    border: 1px solid #FCD34D;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 12px; color: var(--text); font-weight: 600;
    margin-bottom: 18px;
    text-align: left;
  }
  .confirm-actions { display: flex; gap: 8px; }
  .confirm-actions .btn {
    flex: 1; padding: 12px; border-radius: 8px; border: none;
    font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .btn-ghost { background: white; color: var(--text-sub); border: 1px solid var(--border) !important; }
  .btn-primary { background: var(--sv); color: white; }
  .btn-alert { background: var(--bad); color: white; }

  /* ─── 토스트 ─── */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%);
    background: var(--text); color: white;
    padding: 12px 20px; border-radius: 8px;
    font-size: 13px; font-weight: 600;
    z-index: 300;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    animation: toast-in 0.2s ease-out;
  }
  .toast.success { background: var(--good); }
  .toast.error { background: var(--bad); }
  @keyframes toast-in {
    from { opacity: 0; transform: translate(-50%, 10px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }

  /* ─── 좁은 화면 대응 (태블릿 이하) ─── */
  @media (max-width: 900px) {
    body { padding: 0; }
    .app { border-radius: 0; box-shadow: none; min-height: 100vh; }
    .hero { padding: 20px 16px; }
    .hero-title { font-size: 22px; }
    .summary-bar { grid-template-columns: repeat(4, 1fr); }
    .summary-cell { padding: 12px 8px; }
    .summary-value { font-size: 18px; }
    .toolbar { padding: 12px 16px; flex-wrap: wrap; }
    .store-table thead { display: none; }
    .store-table tbody tr { display: block; padding: 12px 16px; }
    .store-table td { display: block; padding: 4px 0; }
    .store-table td.actions { margin-top: 8px; }
    .st-actions { justify-content: flex-start; flex-wrap: wrap; }
    .footer { padding: 20px 16px; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- 로딩 -->
  <div id="loader" class="loader-screen">
    <div class="spinner"></div>
    <div class="loader-text">SV 대시보드 불러오는 중…</div>
    <div class="loader-sub">담당 매장 정보를 정리하고 있어요</div>
  </div>

  <!-- 에러 -->
  <div id="error" class="error-screen" style="display:none;">
    <div class="err-icon">⚠️</div>
    <div class="err-title" id="errorTitle">데이터를 불러올 수 없어요</div>
    <div class="err-msg" id="errorMsg">잠시 후 다시 시도해 주세요.</div>
  </div>

  <!-- 본문 -->
  <div id="content" style="display:none;">
    <div class="hero">
      <span class="hero-tag">SV DASHBOARD · INTERNAL</span>
      <h1 class="hero-title" id="heroTitle">SV 대시보드</h1>
      <div class="hero-sub" id="heroSub">담당 매장 운영 현황</div>
    </div>

    <div class="summary-bar" id="summaryBar"></div>

    <div class="toolbar">
      <input type="text" id="searchInput" class="search-input" placeholder="🔍 매장명 검색...">
      <div class="toolbar-info" id="toolbarInfo">전체 0개 매장 표시중</div>
    </div>

    <table class="store-table">
      <thead>
        <tr>
          <th class="center" style="width:36px;">상태</th>
          <th>매장</th>
          <th class="num">매출</th>
          <th class="num">영업이익률</th>
          <th class="num">순이익률</th>
          <th>검토 / 발송이력</th>
          <th class="center" style="width:340px;">액션</th>
        </tr>
      </thead>
      <tbody id="storeBody"></tbody>
    </table>

    <div class="footer">
      <div class="footer-brand">POKE ALL DAY · SV INTERNAL DASHBOARD</div>
      <div>본 대시보드는 본사 내부 운영 자료입니다.<br>
      📊 점주 리포트 미리보기로 점주가 받을 화면을 확인한 후 점주 발송 버튼을 눌러주세요.</div>
    </div>
  </div>
</div>

<!-- 확인 모달 -->
<div id="confirm" class="confirm-overlay" style="display:none;">
  <div class="confirm-box">
    <div class="confirm-icon" id="confirmIcon">📱</div>
    <div class="confirm-title" id="confirmTitle">알림톡 발송</div>
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-warning" id="confirmWarning" style="display:none;"></div>
    <div class="confirm-actions">
      <button class="btn btn-ghost" onclick="closeConfirm()">취소</button>
      <button class="btn btn-primary" id="confirmBtn">발송</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// 설정
// ═══════════════════════════════════════════════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwh4fpveSQRXqEmNPLiilBfMRJ0kSTggn_XocsptG4KgVQdIE-H47x5-5ShrdqJ6uJQ/exec';
const REPORT_BASE = location.origin + location.pathname.replace(/\/[^/]*$/, '');

// ═══════════════════════════════════════════════════════════
// 유틸
// ═══════════════════════════════════════════════════════════
const $ = (id) => document.getElementById(id);
const won = (n) => Math.round(Number(n || 0)).toLocaleString('ko-KR') + '원';
const wonM = (n) => {
  const v = Number(n || 0);
  if (Math.abs(v) >= 1e8) return (v / 1e8).toFixed(1) + '억';
  if (Math.abs(v) >= 1e4) return Math.round(v / 1e4).toLocaleString('ko-KR') + '만';
  return v.toLocaleString('ko-KR');
};
const pct = (n) => (n === null || n === undefined ? '-' : Math.round(n * 10) / 10 + '%');
const escapeHtml = (s) => String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

function getParams() {
  const p = new URLSearchParams(location.search);
  return {
    sv: p.get('sv') || '',
    month: p.get('month') || '',
  };
}

async function fetchDashboard(sv, month) {
  const url = `${APPS_SCRIPT_URL}?action=svDashboard&sv=${encodeURIComponent(sv)}&month=${encodeURIComponent(month)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('네트워크 오류 (' + res.status + ')');
  const json = await res.json();
  if (!json.success) throw new Error(json.error || '대시보드를 불러올 수 없어요');
  return json.data;
}

async function callAction(action, storeName, month) {
  const url = `${APPS_SCRIPT_URL}?action=${action}&store=${encodeURIComponent(storeName)}&month=${encodeURIComponent(month)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('네트워크 오류 (' + res.status + ')');
  const json = await res.json();
  if (!json.success) throw new Error(json.error || '발송 실패');
  return json.data;
}

function showError(title, msg) {
  $('loader').style.display = 'none';
  $('content').style.display = 'none';
  $('error').style.display = 'flex';
  $('errorTitle').textContent = title;
  $('errorMsg').textContent = msg;
}

function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast ' + (type || '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function formatSentAt(s) {
  if (!s) return '';
  // 'YYYY-MM-DD HH:mm:ss' → 'M/D HH:mm'
  const m = String(s).match(/^(\d{4})-(\d{2})-(\d{2}) (\d{2}):(\d{2})/);
  if (!m) return s;
  return `${parseInt(m[2],10)}/${parseInt(m[3],10)} ${m[4]}:${m[5]}`;
}

// ═══════════════════════════════════════════════════════════
// 확인 모달
// ═══════════════════════════════════════════════════════════
let confirmAction = null;

function openConfirm(opts) {
  $('confirmIcon').textContent = opts.icon || '📱';
  $('confirmTitle').textContent = opts.title || '확인';
  $('confirmMsg').innerHTML = opts.msg || '';
  $('confirmBtn').textContent = opts.confirm || '발송';
  $('confirmBtn').className = 'btn ' + (opts.confirmClass || 'btn-primary');
  if (opts.warning) {
    $('confirmWarning').innerHTML = opts.warning;
    $('confirmWarning').style.display = 'block';
  } else {
    $('confirmWarning').style.display = 'none';
  }
  confirmAction = opts.onConfirm;
  $('confirm').style.display = 'flex';
}

function closeConfirm() {
  $('confirm').style.display = 'none';
  confirmAction = null;
}

$('confirmBtn').addEventListener('click', async () => {
  if (confirmAction) {
    const cb = confirmAction;
    closeConfirm();
    await cb();
  }
});

// ═══════════════════════════════════════════════════════════
// 액션 핸들러
// ═══════════════════════════════════════════════════════════
function openSVReport(storeName) {
  const url = `${REPORT_BASE}/sv-report.html?store=${encodeURIComponent(storeName)}&month=${encodeURIComponent(DATA.month)}`;
  window.open(url, '_blank');
}

function openOwnerReportPreview(ownerUrl) {
  if (!ownerUrl) {
    showToast('❌ 점주 리포트 URL을 만들 수 없어요 (토큰 없음)', 'error');
    return;
  }
  window.open(ownerUrl, '_blank');
}

function handleSendReminder(s) {
  const warning = s.lastReminderSentAt
    ? `이전 독려 발송 이력: <strong>${formatSentAt(s.lastReminderSentAt)}</strong><br>이미 보낸 매장이에요. 다시 보낼까요?`
    : null;
  openConfirm({
    icon: '📱',
    title: '입력 독려 알림 보내기',
    msg: `<strong>${escapeHtml(s.name)}</strong> 점주에게<br>
          비용 입력 독려 알림톡을 보낼까요?<br><br>
          <span style="color:var(--text-light);font-size:11px;">건당 ~10원의 알림톡 비용이 발생해요.</span>`,
    warning: warning,
    confirm: '독려 보내기',
    confirmClass: 'btn-alert',
    onConfirm: async () => {
      try {
        showToast(`${s.name} 알림톡 발송 중…`);
        await callAction('sendReminder', s.name, DATA.month);
        showToast(`✅ ${s.name} 독려 알림 발송 완료`, 'success');
        // 발송 이력 갱신을 위해 데이터 새로고침
        await refreshData();
      } catch (err) {
        showToast(`❌ ${err.message || '발송 실패'}`, 'error');
      }
    },
  });
}

function handleSendReport(s) {
  const warning = s.lastReportSentAt
    ? `⚠ 이미 발송된 매장이에요<br>이전 리포트 발송: <strong>${formatSentAt(s.lastReportSentAt)}</strong><br><br>중복 발송 시 점주가 혼란스러울 수 있어요. 다시 보낼까요?`
    : null;
  openConfirm({
    icon: '📊',
    title: '점주 리포트 발송',
    msg: `<strong>${escapeHtml(s.name)}</strong> 점주에게<br>
          이번 달 리포트 알림톡을 보낼까요?<br><br>
          <span style="color:var(--text-light);font-size:11px;">점주는 본인 토큰이 포함된 가맹점 리포트 URL을 받아요.</span>`,
    warning: warning,
    confirm: warning ? '재발송' : '리포트 발송',
    confirmClass: warning ? 'btn-alert' : 'btn-primary',
    onConfirm: async () => {
      try {
        showToast(`${s.name} 리포트 발송 중…`);
        await callAction('sendReport', s.name, DATA.month);
        showToast(`✅ ${s.name} 점주 리포트 발송 완료`, 'success');
        await refreshData();
      } catch (err) {
        showToast(`❌ ${err.message || '발송 실패'}`, 'error');
      }
    },
  });
}

// ═══════════════════════════════════════════════════════════
// 렌더링
// ═══════════════════════════════════════════════════════════
let DATA = null;
let CURRENT_FILTER = 'all';
let CURRENT_SEARCH = '';

function renderHeader(data) {
  const [year, m] = (data.month || '').split('-');
  const monthLabel = year && m ? `${year}년 ${parseInt(m, 10)}월` : data.month;
  $('heroTitle').textContent = `${data.sv} SV`;
  $('heroSub').textContent = `${monthLabel} · 담당 매장 ${data.summary.totalStores}개`;
}

function renderSummaryBar(data) {
  const s = data.summary;
  const tabs = [
    { key: 'all',     label: '전체',     val: s.totalStores + '개',          cls: 'sv',   click: true },
    { key: 'good',    label: '우수',     val: s.goodCount + '개',            cls: 'good', click: true },
    { key: 'warning', label: '검토',     val: s.warningCount + '개',          cls: 'warn', click: true },
    { key: 'missing', label: '미입력',   val: s.missingCount + '개',          cls: 'bad',  click: true },
  ];
  const stats = [
    { label: '총 매출',          val: wonM(s.totalRevenue) + '원' },
    { label: '총 영업이익',      val: wonM(s.totalOperatingProfit) + '원' },
    { label: '평균 영업이익률',  val: pct(s.avgOperatingRatio), sub: `동종 ${pct(data.benchmark.operatingRatio)}` },
    { label: '평균 순이익률',    val: pct(s.avgNetRatio),       sub: `동종 ${pct(data.benchmark.netRatio)}` },
  ];

  let html = '';
  tabs.forEach(t => {
    const activeCls = CURRENT_FILTER === t.key ? `active ${t.cls}` : '';
    html += `
      <div class="summary-cell click ${activeCls}" data-filter="${t.key}">
        <div class="summary-label">${t.label}</div>
        <div class="summary-value ${t.cls}">${t.val}</div>
      </div>
    `;
  });
  stats.forEach(t => {
    html += `
      <div class="summary-cell">
        <div class="summary-label">${t.label}</div>
        <div class="summary-value">${t.val}</div>
        ${t.sub ? `<div class="summary-sub">${t.sub}</div>` : ''}
      </div>
    `;
  });
  $('summaryBar').innerHTML = html;

  document.querySelectorAll('[data-filter]').forEach(el => {
    el.addEventListener('click', () => {
      CURRENT_FILTER = el.dataset.filter;
      renderSummaryBar(DATA);
      renderStoreList(DATA);
    });
  });
}

function filteredStores(data) {
  let stores = data.stores;
  if (CURRENT_FILTER !== 'all') {
    stores = stores.filter(s => s.status === CURRENT_FILTER);
  }
  if (CURRENT_SEARCH) {
    const q = CURRENT_SEARCH.toLowerCase();
    stores = stores.filter(s => s.name.toLowerCase().includes(q) || (s.id && String(s.id).includes(q)));
  }
  return stores;
}

function statusIcon(status) {
  return ({ good: '✓', warning: '!', missing: '!', normal: '·' })[status] || '·';
}

function statusLabel(status) {
  return ({ good: '우수', warning: '검토', missing: '미입력', normal: '보통' })[status] || '보통';
}

function renderStoreList(data) {
  const stores = filteredStores(data);
  $('toolbarInfo').textContent = `${stores.length}개 매장 표시중 (전체 ${data.summary.totalStores}개)`;

  if (stores.length === 0) {
    $('storeBody').innerHTML = `
      <tr><td colspan="7" style="text-align:center; padding:40px; color:var(--text-light); font-size:13px;">
        해당하는 매장이 없어요
      </td></tr>
    `;
    return;
  }

  $('storeBody').innerHTML = stores.map((s, i) => renderStoreRow(s, i)).join('');
  bindRowActions(stores);
}

function renderStoreRow(s, idx) {
  if (!s.hasData) {
    // 미입력 매장
    const lastInfo = s.lastSubmittedMonth ? `마지막 입력 ${s.lastSubmittedMonth}` : '입력 이력 없음';
    const reminderInfo = s.lastReminderSentAt
      ? `<span class="sent-warn">📱 ${formatSentAt(s.lastReminderSentAt)} 독려 발송됨</span>`
      : '<span style="color:var(--text-light);">독려 발송 이력 없음</span>';
    return `
      <tr class="missing" data-store-idx="${idx}">
        <td class="center"><span class="st-status missing">!</span></td>
        <td>
          <div class="st-name">
            <span>${escapeHtml(s.name)}</span>
            ${s.id ? `<span class="st-id">#${escapeHtml(s.id)}</span>` : ''}
          </div>
          <div class="st-meta">${escapeHtml([s.region, s.zone].filter(Boolean).join(' · ') || '-')}</div>
        </td>
        <td class="num" style="color:var(--bad); font-weight:700;">미입력</td>
        <td class="num" style="color:var(--text-light);">-</td>
        <td class="num" style="color:var(--text-light);">-</td>
        <td>
          <div class="st-history">
            <div>${escapeHtml(lastInfo)}</div>
            <div>${reminderInfo}</div>
          </div>
        </td>
        <td class="center actions">
          <div class="st-actions">
            <button class="btn-mini disabled" disabled title="입력 완료 후 활성화">📊 SV 리포트</button>
            <button class="btn-mini disabled" disabled title="입력 완료 후 활성화">📋 점주 미리보기</button>
            <button class="btn-mini disabled" disabled title="입력 완료 후 활성화">📱 점주 발송</button>
            <button class="btn-mini alert" data-act="reminder" data-idx="${idx}">📱 입력 독려</button>
          </div>
        </td>
      </tr>
    `;
  }

  // 입력 완료 매장
  const deltaCls = s.vsAvgOpRatio >= 0 ? 'up' : 'down';
  const deltaSign = s.vsAvgOpRatio >= 0 ? '+' : '';
  const deltaNetCls = s.vsAvgNetRatio >= 0 ? 'up' : 'down';
  const deltaNetSign = s.vsAvgNetRatio >= 0 ? '+' : '';

  const issuesText = s.issues && s.issues.length > 0
    ? s.issues.slice(0, 2).map(i => escapeHtml(i)).join('<br>')
    : '';

  const reportHistoryText = s.lastReportSentAt
    ? `<span class="sent-good">📊 ${formatSentAt(s.lastReportSentAt)} 점주 발송 완료</span>`
    : '<span style="color:var(--text-light);">점주 미발송</span>';
  const reminderHistoryText = s.lastReminderSentAt
    ? `<div style="color:var(--text-sub);">📱 ${formatSentAt(s.lastReminderSentAt)} 독려 발송</div>`
    : '';

  const reportBtnClass = s.lastReportSentAt ? 'btn-mini success' : 'btn-mini primary';
  const reportBtnText = s.lastReportSentAt ? '✓ 재발송' : '📱 점주 발송';

  return `
    <tr class="${s.status}" data-store-idx="${idx}">
      <td class="center"><span class="st-status ${s.status}">${statusIcon(s.status)}</span></td>
      <td>
        <div class="st-name">
          <span>${escapeHtml(s.name)}</span>
          ${s.id ? `<span class="st-id">#${escapeHtml(s.id)}</span>` : ''}
          ${s.operation ? `<span class="st-op-badge">${escapeHtml(s.operation)}</span>` : ''}
        </div>
        <div class="st-meta">${escapeHtml([s.region, s.zone].filter(Boolean).join(' · ') || '-')}</div>
      </td>
      <td class="num"><div class="st-revenue">${wonM(s.revenue)}원</div></td>
      <td class="num">
        <div class="st-ratio">${pct(s.operatingRatio)}</div>
        <div class="st-delta ${deltaCls}">${deltaSign}${s.vsAvgOpRatio}%p</div>
      </td>
      <td class="num">
        <div class="st-ratio">${pct(s.netRatio)}</div>
        <div class="st-delta ${deltaNetCls}">${deltaNetSign}${s.vsAvgNetRatio}%p</div>
      </td>
      <td>
        ${issuesText ? `<div class="st-issues">⚠ ${issuesText}</div>` : ''}
        <div class="st-history" style="margin-top:4px;">
          ${reportHistoryText}
          ${reminderHistoryText}
        </div>
      </td>
      <td class="center actions">
        <div class="st-actions">
          <button class="btn-mini" data-act="sv-report" data-idx="${idx}">📊 SV 리포트</button>
          <button class="btn-mini" data-act="owner-preview" data-idx="${idx}">📋 점주 미리보기</button>
          <button class="${reportBtnClass}" data-act="send-report" data-idx="${idx}">${reportBtnText}</button>
        </div>
      </td>
    </tr>
  `;
}

function bindRowActions(stores) {
  document.querySelectorAll('[data-act]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const idx = parseInt(btn.dataset.idx, 10);
      const s = stores[idx];
      const act = btn.dataset.act;
      if (act === 'sv-report') openSVReport(s.name);
      else if (act === 'owner-preview') openOwnerReportPreview(s.ownerReportUrl);
      else if (act === 'send-report') handleSendReport(s);
      else if (act === 'reminder') handleSendReminder(s);
    });
  });
}

// ═══════════════════════════════════════════════════════════
// 검색
// ═══════════════════════════════════════════════════════════
$('searchInput').addEventListener('input', (e) => {
  CURRENT_SEARCH = e.target.value.trim();
  renderStoreList(DATA);
});

// ═══════════════════════════════════════════════════════════
// 데이터 새로고침 (발송 후 호출)
// ═══════════════════════════════════════════════════════════
async function refreshData() {
  try {
    const { sv, month } = getParams();
    const data = await fetchDashboard(sv, month);
    DATA = data;
    renderSummaryBar(data);
    renderStoreList(data);
  } catch (err) {
    showToast(`❌ 데이터 새로고침 실패: ${err.message}`, 'error');
  }
}

// ═══════════════════════════════════════════════════════════
// 메인
// ═══════════════════════════════════════════════════════════
function render(data) {
  DATA = data;
  $('loader').style.display = 'none';
  $('content').style.display = 'block';
  renderHeader(data);
  renderSummaryBar(data);
  renderStoreList(data);
}

(async function main() {
  const { sv, month } = getParams();
  if (!sv || !month) {
    showError('SV 정보가 부족해요', 'URL에 sv와 month 파라미터가 필요해요.\n예: ?sv=전민석&month=2026-05');
    return;
  }
  try {
    const data = await fetchDashboard(sv, month);
    if (!data.stores || data.stores.length === 0) {
      showError('담당 매장이 없어요', `${sv} SV의 ${month} 기준 담당 매장을 찾지 못했어요.\nSV 이름이 정확한지 확인해 주세요.`);
      return;
    }
    render(data);
  } catch (err) {
    showError('대시보드를 불러올 수 없어요', err.message || '잠시 후 다시 시도해 주세요.');
  }
})();
</script>
</body>
</html>
